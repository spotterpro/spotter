name: spotter
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.3
  firebase_storage: ^11.7.7

  # Authentication & Social
  google_sign_in: ^6.2.1
  flutter_signin_button: ^2.0.0

  # State Management (👑 강력 추천)
  flutter_riverpod: ^2.5.1 # 앱 전체의 데이터 흐름을 관리할 사령탑입니다.

  # Core Features
  nfc_manager: ^3.4.0
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  kakao_map_plugin: ^0.3.7

  # UI & Utilities
  image_picker: ^1.1.2
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  font_awesome_flutter: ^10.7.0 # 👑 아이콘 라이브러리 업데이트
  dotted_border: ^2.1.0
  cupertino_icons: ^1.0.2
  fl_chart: ^0.68.0

  # Networking & Data
  http: ^1.2.1
  rxdart: ^0.28.0
  uuid: ^4.4.0 # 👑 코드에서 사용 중이므로 명시적으로 추가

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.2 # 👑 코드 품질 관리를 위해 업데이트 강력 추천

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/kakao_signin_button.png
    - assets/images/google_signin_button.png
    - assets/icon/app_icon.png